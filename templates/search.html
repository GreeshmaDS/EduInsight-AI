<!DOCTYPE html>
<html>

<head>

<title>Search Student</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>🔍 Search Student</h1>

<form method="POST">

<input
type="text"
name="keyword"
placeholder="Enter Student ID or Name"
required>

<br><br>

<button type="submit">

Search

</button>

</form>

<br>

<table>

<tr>

<th>ID</th>

<th>Name</th>

<th>Department</th>

<th>Prediction</th>

<th>Grade</th>

<th>Confidence</th>

</tr>

{% for row in rows %}

<tr>

<td>{{row[1]}}</td>

<td>{{row[2]}}</td>

<td>{{row[4]}}</td>

<td>{{row[10]}}</td>

<td>{{row[12]}}</td>

<td>{{row[11]}}%</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/dashboard">

<button>

⬅ Dashboard

</button>

</a>

</div>

</body>

</html>
